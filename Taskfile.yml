version: '3'

dotenv:
  - .env

vars:
  DATA_FILE:
    data/data.json
  SERVER_JAR:
    server/build/libs/server-*-jar-with-dependencies.jar
  CLIENT_JAR:
    client/build/libs/client-*-jar-with-dependencies.jar

tasks:
  build:
    desc: Build all modules with Gradle
    cmds:
      - ./gradlew build jarWithDeps

  rebuild:
    desc: Clean and rebuild all modules with Gradle
    cmds:
      - rm -rf .gradle/configuration-cache
      - ./gradlew --no-configuration-cache clean build jarWithDeps
      # - ./gradlew --no-configuration-cache clean build jarWithDeps -x checkstyleMain -x checkstyleTest -x spotlessCheck

  checkstyle:
    desc: Check code style and rules
    cmds:
      - ./gradlew check

  format:
    desc: Autoformat Java code
    cmds:
      - ./gradlew spotlessApply

  javadoc:
    desc: Build JavaDoc
    cmds:
      - ./gradlew javadoc

  vault:up:
    desc: Start Vault container
    cmds:
      - docker compose up -d vault
      - sleep 2

  vault:init:
    desc: Init Vault, unseal, configure PKI + AppRole + policy
    cmds:
      - ./vault/vault-init.sh

  vault:unseal:
    desc: Unseal Vault after container restart
    cmds:
      - ./vault/vault-unseal.sh

  vault:down:
    desc: Stop the Vault container
    cmds:
      - docker compose down

  vault:nuke:
    desc: Stop Vault and wipe all its data
    cmds:
      - docker compose down
      - rm -rf vault/data .vault-state.json .vault-approle.env

  run:server:
    desc: Build and run server
    cmds:
      - ./gradlew :server:jarWithDeps
      - java -jar {{.SERVER_JAR}} {{.DATA_FILE}} {{.CLI_ARGS}}
      # - java -jar server/build/libs/server-*-jar-with-dependencies.jar data/data.json

  run:client:
    desc: Build and run client
    cmds:
      - ./gradlew :client:jarWithDeps
      - java -jar {{.CLIENT_JAR}} {{.CLI_ARGS}}
      # - java -jar client/build/libs/client-*-jar-with-dependencies.jar

  tunnel:helios:
    desc: Open SSH tunnel to Helios
    cmds:
      - ssh -p "${SSH_PORT}" "${SSH_USERNAME}@${SSH_HOST}" -L "${TUNNEL_LOCAL_PORT}:${TUNNEL_REMOTE_HOST}:${TUNNEL_REMOTE_PORT}"
